<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VISIOBEATS ♬</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: radial-gradient(circle at center, #0a0a12, #05050a);
    color: white;
    font-family: Poppins, sans-serif;
}

header {
    text-align: center;
    padding: 50px 20px 20px;
}

h1 {
    font-family: Orbitron;
    font-size: clamp(2rem, 5vw, 3.5rem);
    text-shadow: 0 0 25px #ff004c;
}

.subtitle {
    opacity: 0.6;
    margin-bottom: 15px;
}

.section {
    max-width: 1200px;
    margin: 50px auto;
    padding: 0 20px;
}

.section h2 {
    margin-bottom: 25px;
}

.slider {
    display: flex;
    gap: 25px;
    overflow-x: auto;
    padding-bottom: 10px;
}

.card {
    min-width: 260px;
    height: 300px;
    background: linear-gradient(145deg, #111122, #0a0a18);
    border-radius: 20px;
    padding: 20px;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.card:hover {
    box-shadow: 0 20px 40px rgba(255,0,76,0.3);
}

.new {
    position: absolute;
    top: 12px;
    left: 12px;
    background: #ff004c;
    padding: 5px 10px;
    font-size: 0.7rem;
    border-radius: 6px;
}

.card h3 {
    font-size: 1.1rem;
}

audio {
    width: 100%;
    margin: 10px 0;
    filter: invert(1);
}

.price {
    margin: 5px 0;
    font-weight: 600;
}

button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(90deg, #ff004c, #ff66cc);
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

</style>
</head>

<body>

<header>
<h1>VISIOBEATS ♬</h1>
<div class="subtitle">Enter The Void</div>
</header>

<div class="section">
<h2>NEW BEATS 🎵</h2>
<div class="slider" id="beats"></div>
</div>

<div class="section">
<h2>CINEMATIC 🎬</h2>
<div class="slider" id="cinematic"></div>
</div>

<script>
const beats = [
{title:"FALL APART", file:"beat1.mp3"},
{title:"END OF TIME", file:"beat2.mp3"},
{title:"LAST TIME", file:"beat3.mp3"},
{title:"LOGISTICS", file:"beat4.mp3"},
{title:"TWO FACED", file:"beat5.mp3"},
];

const cinematic = [
{title:"MENTAL DEFLATION", file:"horror1.mp3"},
{title:"COMING SOON", file:"horror2.mp3"},
{title:"COMING SOON", file:"horror3.mp3"}
];

function createCards(list, id) {
    const container = document.getElementById(id);

    list.forEach((item, index) => {
        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
        ${id === "beats" && index < 2 ? '<div class="new">NEW</div>' : ''}
        <h3>${item.title}</h3>
        <audio controls>
            <source src="${item.file}" type="audio/mpeg">
        </audio>
        <div class="price">$10</div>
        <button>PURCHASE ⚡</button>
        `;

        // 3D hover effect
        card.addEventListener("mousemove", e => {
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            const rotateX = -(y - rect.height/2) / 10;
            const rotateY = (x - rect.width/2) / 10;

            card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        });

        card.addEventListener("mouseleave", () => {
            card.style.transform = "rotateX(0) rotateY(0)";
        });

        container.appendChild(card);
    });
}

createCards(beats, "beats");
createCards(cinematic, "cinematic");
</script>

</body>
</html>

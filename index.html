<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>VISIO BEATS</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>VISIO BEATS</h1>
  <p>See the Sound.</p>
</header>

<section class="hero">
  <h2>Emotion in Every Frequency</h2>
</section>

<section class="beats">

  <!-- BEAT 1 -->
  <div class="beat">
    <h3>Falling Lights</h3>

    <audio controls>
      <source src="beat1.mp3" type="audio/mpeg">
      Your browser does not support audio.
    </audio>

    <button class="buy-btn" data-link="https://buy.stripe.com/aFa8wH8b2cIqcwN0Fr5J600">
      Buy - $10
    </button>
  </div>

  <!-- BEAT 2 -->
  <div class="beat">
    <h3>End of Time</h3>

    <audio controls>
      <source src="beat2.mp3" type="audio/mpeg">
      Your browser does not support audio.
    </audio>

    <button class="buy-btn" data-link="https://buy.stripe.com/aFa3cn9f637Q9kB4VH5J601">
      Buy - $10
    </button>
  </div>

  <!-- BEAT 3 -->
  <div class="beat">
    <h3>God’s Land</h3>

    <audio controls>
      <source src="beat3.mp3" type="audio/mpeg">
      Your browser does not support audio.
    </audio>

    <button class="buy-btn" data-link="https://buy.stripe.com/9B6dR1dvm8safIZgEp5J602">
      Buy - $10
    </button>
  </div>

  <!-- SOLD OUT -->
  <div class="beat sold">
    <h3>Empty Nights</h3>

    <audio controls>
      <source src="audio/beat4.mp3" type="audio/mpeg">
    </audio>

    <button disabled>Sold Out</button>
  </div>

</section>

<footer>
  <p>© VISIO BEATS</p>
</footer>

<script>
document.querySelectorAll(".buy-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    window.location.href = btn.dataset.link;
  });
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VISIOBEATS ♬</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
 
<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: Poppins, sans-serif;
    overflow-x: hidden;
}

/* BACKGROUND */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee') center/cover no-repeat;
    z-index: -1;
    filter: brightness(0.3);
}

/* HEADER */
header {
    text-align: center;
    padding: 40px;
}

h1 {
    font-family: Orbitron;
    font-size: 3rem;
    text-shadow: 0 0 20px #ff004c;
}

/* SECTION */
.section {
    text-align: center;
    margin: 40px 0;
}

/* 🔥 3D CAROUSEL */
.carousel {
    position: relative;
    height: 320px;
    perspective: 1000px;
}

.carousel-track {
    position: relative;
    height: 100%;
}

.card {
    position: absolute;
    width: 260px;
    left: 50%;
    top: 50%;
    transform-style: preserve-3d;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.7);
    padding: 15px;
    border-radius: 15px;
    transition: 0.5s;
    opacity: 0;
}

.card.active {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1.1);
    z-index: 3;
    box-shadow: 0 0 30px #ff004c;
}

.card.left {
    opacity: 0.6;
    transform: translate(-150%, -50%) scale(0.9) rotateY(20deg);
    z-index: 2;
}

.card.right {
    opacity: 0.6;
    transform: translate(50%, -50%) scale(0.9) rotateY(-20deg);
    z-index: 2;
}

.card.hidden {
    opacity: 0;
}

/* CINEMATIC COLOR */
.cinematic .card.active {
    box-shadow: 0 0 30px #8a00ff;
}

/* AUDIO */
audio {
    width: 100%;
    margin: 10px 0;
    filter: invert(1);
}

/* BUTTON */
button {
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: linear-gradient(90deg, #ff004c, #8a00ff);
    color: white;
    cursor: pointer;
}

/* NAV */
.nav {
    margin-top: 10px;
}

.nav button {
    width: auto;
    padding: 10px 20px;
    margin: 5px;
}
</style>
</head>

<body>

<header>
    <h1>VISIOBEATS ♬</h1>
    <div>Enter The Void</div>
</header>

<div class="section">
    <h2>NEW BEATS 🎵</h2>
    <div class="carousel">
        <div class="carousel-track" id="beats"></div>
    </div>
    <div class="nav">
        <button onclick="move('beats', -1)">◀</button>
        <button onclick="move('beats', 1)">▶</button>
    </div>
</div>

<div class="section cinematic">
    <h2>CINEMATIC 🎬</h2>
    <div class="carousel">
        <div class="carousel-track" id="cinematic"></div>
    </div>
    <div class="nav">
        <button onclick="move('cinematic', -1)">◀</button>
        <button onclick="move('cinematic', 1)">▶</button>
    </div>
</div>

<script>
const paypal = "https://paypal.me/zkaterswrldd/10";

// 🎵 BEATS ($10)
const beats = [
    {title:"'FALL APART'", file:"beat1.mp3"},
    {title:"'END OF THE WORLD'", file:"beat2.mp3"},
    {title:"'COMING SOON...'", file:"audio/beat3.mp3"},
    {title:"'COMING SOON...'", file:"audio/beat4.mp3"}
];

// 🎬 CINEMATIC ($12)
const cinematic = [
    {title:"'MENTAL DEFLATION'", file:"audio/horror1.mp3"},
    {title:"'COMING SOON...'", file:"audio/horror2.mp3"},
    {title:"'COMING SOON...'", file:"audio/horror3.mp3"}
];

const state = {
    beats: 0,
    cinematic: 0
};

// CREATE CARDS
function createCards(list, containerId, price) {
    const container = document.getElementById(containerId);

    list.forEach(item => {
        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <h3>${item.title}</h3>
            <audio controls>
                <source src="${item.file}" type="audio/mpeg">
            </audio>
            <p>$${price}</p>
            <a href="${paypal}" target="_blank">
                <button>BUY ⚡</button>
            </a>
        `;

        container.appendChild(card);
    });

    update(containerId);
}

// UPDATE POSITIONS
function update(id) {
    const container = document.getElementById(id);
    const cards = container.children;
    const current = state[id];

    for (let i = 0; i < cards.length; i++) {
        cards[i].className = "card";

        if (i === current) {
            cards[i].classList.add("active");
        } else if (i === current - 1) {
            cards[i].classList.add("left");
        } else if (i === current + 1) {
            cards[i].classList.add("right");
        } else {
            cards[i].classList.add("hidden");
        }
    }
}

// MOVE
function move(id, dir) {
    const listLength = document.getElementById(id).children.length;
    state[id] = (state[id] + dir + listLength) % listLength;
    update(id);
}

// LOAD
createCards(beats, "beats", 10);
createCards(cinematic, "cinematic", 8);
</script>

</body>
</html>

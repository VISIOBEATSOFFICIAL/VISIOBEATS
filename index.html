<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VISIOBEATS ♬</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: radial-gradient(circle at top, #1a001f, #000);
    color: white;
    font-family: Poppins, sans-serif;
    overflow-x: hidden;
}

header {
    text-align: center;
    padding: 60px 20px 20px;
}

h1 {
    font-family: Orbitron;
    font-size: 3rem;
    color: #fff;
    text-shadow: 0 0 25px #ff00c8;
}

.subtitle {
    opacity: 0.6;
}

.section {
    max-width: 1200px;
    margin: 60px auto;
    padding: 0 20px;
}

.section h2 {
    text-align: center;
    margin-bottom: 30px;
}

.slider {
    display: flex;
    gap: 25px;
    overflow-x: auto;
    padding: 20px;
}

.slider::-webkit-scrollbar {
    height: 6px;
}
.slider::-webkit-scrollbar-thumb {
    background: linear-gradient(90deg,#ff00c8,#8a00ff);
}

.card {
    min-width: 280px;
    background: #0f0f1a;
    border-radius: 20px;
    padding: 20px;
    text-align: center;
    position: relative;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-10px) scale(1.03);
    box-shadow: 0 0 30px #ff00c8;
}

.card.active {
    box-shadow: 0 0 60px #ff00c8;
}

.new {
    position: absolute;
    top: 10px;
    left: 10px;
    background: #ff004c;
    padding: 5px 10px;
    font-size: 0.7rem;
    border-radius: 6px;
}

.card h3 {
    margin: 15px 0;
}

audio {
    width: 100%;
    margin: 15px 0;
    filter: invert(1);
}

button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(90deg,#ff004c,#8a00ff);
    color: white;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    opacity: 0.85;
}
</style>
</head>

<body>

<header>
    <h1>VISIOBEATS ♬</h1>
    <div class="subtitle">Enter The Void</div>
</header>

<div class="section">
    <h2>NEW BEATS 🎵</h2>
    <div class="slider" id="beats"></div>
</div>

<div class="section">
    <h2>CINEMATIC 🎬</h2>
    <div class="slider" id="cinematic"></div>
</div>

<script>
const paypal = "https://paypal.me/zkaterswrldd/10";

const beats = [
{title:"FALL APART", file:"beat1.mp3"},
{title:"END OF THE WORLD", file:"beat2.mp3"},
{title:"COMING SOON...", file:"beat3.mp3"},
{title:"COMING SOON...", file:"beat4.mp3"}
];

const cinematic = [
{title:"MENTAL DEFLATION", file:"horror1.mp3"},
{title:"COMING SOON...", file:"horror2.mp3"},
{title:"COMING SOON...", file:"horror3.mp3"}
];

function createCards(list, id) {
const container = document.getElementById(id);

list.forEach((item, index) => {
const card = document.createElement("div");
card.className = "card";

card.innerHTML = `
${id === "beats" && index === 0 ? '<div class="new">NEW</div>' : ''}
<h3>${item.title}</h3>
<audio controls>
<source src="${item.file}" type="audio/mpeg">
</audio>
<p>$10</p>
<button onclick="buy()">BUY ⚡</button>
`;

// Glow center card effect
card.addEventListener("mouseenter", () => {
card.classList.add("active");
});
card.addEventListener("mouseleave", () => {
card.classList.remove("active");
});

container.appendChild(card);
});
}

function buy() {
window.open(paypal, "_blank");
}

createCards(beats, "beats");
createCards(cinematic, "cinematic");
</script>

</body>
</html>

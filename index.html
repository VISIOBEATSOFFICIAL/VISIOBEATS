<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VISIOBEATS ♬</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: #0a0a12;
    color: white;
    font-family: Poppins, sans-serif;
    overflow-x: hidden;
}

/* PARTICLE BACKGROUND */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
}

/* HEADER */
header {
    text-align: center;
    padding: 40px 20px 10px;
}

h1 {
    font-family: Orbitron;
    font-size: clamp(1.8rem, 4vw, 2.8rem);
    text-shadow: 0 0 20px #ff004c;
}

.subtitle {
    opacity: 0.6;
}

/* YOUTUBE LINK */
.youtube {
    margin-top: 10px;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    opacity: 0.8;
}
.youtube:hover {
    opacity: 1;
}
.youtube img {
    width: 20px;
}

/* SECTION */
.section {
    max-width: 1100px;
    margin: 40px auto;
    padding: 0 15px;
}

.section h2 {
    margin-bottom: 20px;
    font-size: clamp(1.2rem, 2vw, 1.6rem);
}

/* SLIDER */
.slider {
    display: flex;
    gap: 20px;
    overflow-x: auto;
    padding-bottom: 10px;
}

/* CARD */
.card {
    min-width: 240px;
    flex: 0 0 auto;
    background: #111122;
    border-radius: 15px;
    padding: 15px;
    transition: 0.3s;
    position: relative;
}

.card:hover {
    transform: translateY(-6px);
    box-shadow: 0 0 15px #ff004c;
}

/* NEW BADGE */
.new {
    position: absolute;
    top: 10px;
    left: 10px;
    background: #ff004c;
    padding: 4px 8px;
    font-size: 0.7rem;
    border-radius: 5px;
}

/* AUDIO */
audio {
    width: 100%;
    margin: 10px 0;
    filter: invert(1);
}

/* BUTTON */
button {
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: linear-gradient(90deg, #ff004c, #8a00ff);
    color: white;
    cursor: pointer;
}

button:hover {
    opacity: 0.85;
}

/* MOBILE */
@media (max-width: 600px) {
    .card {
        min-width: 200px;
    }
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<header>
    <h1>VISIOBEATS ♬</h1>
    <div class="subtitle">Enter The Void</div>

    <div class="youtube" onclick="window.open('https://youtube.com/@VisiobeatsOfficial')">
        <img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png">
        <span>@yourname</span>
    </div>
</header>

<div class="section">
    <h2>NEW BEATS 🎵</h2>
    <div class="slider" id="beats"></div>
</div>

<div class="section">
    <h2>CINEMATIC 🎬</h2>
    <div class="slider" id="cinematic"></div>
</div>

<script>
// PARTICLES
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

let particles = [];
for (let i = 0; i < 80; i++) {
    particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 2,
        dx: (Math.random() - 0.5) * 0.5,
        dy: (Math.random() - 0.5) * 0.5
    });
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#ff004c";

    particles.forEach(p => {
        p.x += p.dx;
        p.y += p.dy;

        if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
        if (p.y < 0 || p.y > canvas.height) p.dy *= -1;

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
    });

    requestAnimationFrame(animate);
}
animate();

// AUDIO CONTROL (ONLY ONE PLAYS)
let currentAudio = null;

document.addEventListener("play", function(e) {
    if (currentAudio && currentAudio !== e.target) {
        currentAudio.pause();
    }
    currentAudio = e.target;
}, true);

const paypal = "https://paypal.me/zkaterswrldd/10";

const beats = [
{title:"'FALL APART'", file:"beat1.mp3"},
{title:"'END OF THE TIME'", file:"beat2.mp3"},
{title:"'LAST TIME'", file:"beat3.mp3"},
{title:"'COMING SOON...'", file:"beat4.mp3"}
];

const cinematic = [
{title:"'MENTAL DEFLATION'", file:"horror1.mp3"},
{title:"'COMING SOON...'", file:"horror2.mp3"},
{title:"'COMING SOON...'", file:"horror3.mp3"}
];

function createCards(list, id) {
const container = document.getElementById(id);

list.forEach((item, index) => {
const card = document.createElement("div");
card.className = "card";

card.innerHTML = `
${id === "beats" && index < 2 ? '<div class="new">NEW</div>' : ''}
<h3>${item.title}</h3>
<audio controls>
<source src="${item.file}" type="audio/mpeg">
</audio>
<p>$10</p>
<button onclick="buy()">BUY ⚡</button>
`;

container.appendChild(card);
});
}

function buy() {
window.open(paypal, "_blank");
}

createCards(beats, "beats");
createCards(cinematic, "cinematic");
</script>

</body>
</html>

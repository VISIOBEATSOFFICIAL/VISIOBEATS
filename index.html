<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VISIOBEATS ♬</title>

<!-- ✅ FAVICON -->
<link rel="icon" href="images.png">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
<style>
body {
    margin: 0;
    background: radial-gradient(circle at top, #0f0f1a, #000000 70%);
    color: white;
    font-family: Poppins, sans-serif;
    overflow-x: hidden;
}

/* DARK GRAIN OVERLAY */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: 
        radial-gradient(circle at 30% 20%, rgba(138,0,255,0.15), transparent 40%),
        radial-gradient(circle at 70% 80%, rgba(255,0,76,0.15), transparent 40%);
    z-index: -2;
}

/* NOISE TEXTURE */
body::after {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: url("https://grainy-gradients.vercel.app/noise.svg");
    opacity: 0.15;
    z-index: -1;
}

/* HEADER */
h1 {
    font-family: Orbitron;
    font-size: 3rem;
    text-shadow: 0 0 20px #ff004c, 0 0 40px #8a00ff;
}

/* CARD IMPROVEMENTS */
.card {
    position: absolute;
    width: 260px;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    background: rgba(10,10,20,0.8);
    backdrop-filter: blur(10px);
    padding: 15px;
    border-radius: 15px;
    transition: 0.5s;
    opacity: 0;
    border: 1px solid rgba(255,255,255,0.05);
}

/* GLOW ACTIVE */
.card.active {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1.1);
    z-index: 3;
    box-shadow: 0 0 25px #ff004c, 0 0 60px #8a00ff;
}

/* BUTTON UPGRADE */
button {
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: linear-gradient(90deg, #ff004c, #8a00ff);
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px #ff004c;
}

/* 🔥 NEW BADGE */
.new-badge {
    position: absolute;
    top: 10px;
    left: 10px;
    background: #ff004c;
    color: white;
    font-size: 0.7rem;
    padding: 4px 8px;
    border-radius: 5px;
    box-shadow: 0 0 10px #ff004c;
}
    </style>
</head>
    

<body>

<header>
    <h1>VISIOBEATS ♬</h1>
    <div>Enter The Void</div>
</header>

<div class="section">
    <h2>NEW BEATS 🎵</h2>
    <div class="carousel">
        <div class="carousel-track" id="beats"></div>
    </div>
    <div class="nav">
        <button onclick="move('beats', -1)">◀</button>
        <button onclick="move('beats', 1)">▶</button>
    </div>
</div>

<div class="section cinematic">
    <h2>CINEMATIC 🎬</h2>
    <div class="carousel">
        <div class="carousel-track" id="cinematic"></div>
    </div>
    <div class="nav">
        <button onclick="move('cinematic', -1)">◀</button>
        <button onclick="move('cinematic', 1)">▶</button>
    </div>
</div>

<script>
const paypal = "https://paypal.me/zkaterswrldd/10";

// ✅ ONLY FILES THAT EXIST
const beats = [
    {title:"FALL APART", file:"beat1.mp3"},
    {title:"END OF THE WORLD", file:"beat2.mp3"},
    {title:"COMING SOON...", file:"beat3.mp3"},
    {title:"COMING SOON...", file:"beat4.mp3"}
];

const cinematic = [
    {title:"MENTAL DEFLATION", file:"horror1.mp3"},
    {title:"COMING SOON...", file:"horror2.mp3"},
    {title:"COMING SOON...", file:"horror3.mp3"}
];

const state = { beats: 0, cinematic: 0 };

// ✅ FIXED AUDIO SYSTEM
function stopAllAudio(current) {
    document.querySelectorAll("audio").forEach(a => {
        if (a !== current) {
            a.pause();
            a.currentTime = 0;
        }
    });
}

// CREATE CARDS
function createCards(list, id, price) {
    const container = document.getElementById(id);

    list.forEach(item => {
        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <h3>${item.title}</h3>
            <audio controls>
                <source src="${item.file}" type="audio/mpeg">
            </audio>
            <p>$${price}</p>
            <a href="${paypal}" target="_blank">
                <button>BUY ⚡</button>
            </a>
        `;

        const audio = card.querySelector("audio");
        audio.addEventListener("play", () => stopAllAudio(audio));

        container.appendChild(card);
    });

    update(id);
}

// UPDATE (WRAP FIX)
function update(id) {
    const cards = document.getElementById(id).children;
    const current = state[id];

    for (let i = 0; i < cards.length; i++) {
        cards[i].className = "card";

        if (i === current) {
            cards[i].classList.add("active");
        } else if (i === (current - 1 + cards.length) % cards.length) {
            cards[i].classList.add("left");
        } else if (i === (current + 1) % cards.length) {
            cards[i].classList.add("right");
        } else {
            cards[i].classList.add("hidden");
        }
    }
}

// MOVE
function move(id, dir) {
    const len = document.getElementById(id).children.length;
    state[id] = (state[id] + dir + len) % len;
    update(id);
}

// LOAD EVERYTHING ($10)
createCards(beats, "beats", 10);
createCards(cinematic, "cinematic", 10);
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VISIOBEATS ♬</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: radial-gradient(circle at center, #1a0022, #000);
    color: white;
    font-family: Poppins, sans-serif;
}

header {
    text-align: center;
    padding: 60px 20px 20px;
}

h1 {
    font-family: Orbitron;
    font-size: clamp(2.5rem, 6vw, 4rem);
    color: white;
    text-shadow: 0 0 25px #ff2aa0;
}

.subtitle {
    opacity: 0.7;
    margin-top: 10px;
}

.section {
    max-width: 1100px;
    margin: 60px auto;
    padding: 0 20px;
    text-align: center;
}

.slider {
    display: flex;
    justify-content: center;
    gap: 30px;
    flex-wrap: wrap;
}

.card {
    width: 260px;
    height: 200px;
    background: #0a0a14;
    border-radius: 20px;
    padding: 20px;
    position: relative;
    box-shadow: 0 0 40px rgba(255,0,120,0.4);
    transition: 0.3s;
}

.card.center {
    transform: scale(1.1);
    box-shadow: 0 0 60px rgba(255,0,120,0.8);
}

.card:hover {
    transform: scale(1.15);
}

.new {
    position: absolute;
    top: 10px;
    left: 10px;
    background: #ff2aa0;
    padding: 5px 10px;
    border-radius: 6px;
    font-size: 0.7rem;
}

h3 {
    margin-top: 20px;
}

.price {
    margin: 10px 0;
    opacity: 0.8;
}

button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(90deg, #ff2aa0, #ff6ec7);
    color: white;
    font-weight: bold;
    cursor: pointer;
}

.download-btn {
    background: linear-gradient(90deg, #ff2aa0, #ffffff);
    color: black;
}

</style>
</head>

<body>

<header>
<h1>VISIOBEATS ♬</h1>
<div class="subtitle">Enter The Void</div>
</header>

<div class="section">
<h2>NEW BEATS 🎵</h2>
<div class="slider" id="beats"></div>
</div>

<script>
const paypal = "https://paypal.me/zkaterswrldd/10";

let unlocked = JSON.parse(localStorage.getItem("purchased")) || [];

const beats = [
{title:"FALL APART", file:"beat1.mp3"},
{title:"END OF THE WORLD", file:"beat2.mp3"},
{title:"COMING SOON", file:"beat3.mp3"}
];

function purchase(file) {
    window.open(paypal, "_blank");

    setTimeout(() => {
        unlocked.push(file);
        localStorage.setItem("purchased", JSON.stringify(unlocked));
        location.reload();
    }, 2000);
}

function createCards() {
    const container = document.getElementById("beats");

    beats.forEach((item, i) => {
        const card = document.createElement("div");
        card.className = "card" + (i === 1 ? " center" : "");

        const isUnlocked = unlocked.includes(item.file);

        card.innerHTML = `
        ${i === 0 ? '<div class="new">NEW</div>' : ''}
        <h3>${item.title}</h3>
        <div class="price">$10</div>
        ${isUnlocked 
            ? `<a href="${item.file}" download><button class="download-btn">DOWNLOAD MP3 ⚡</button></a>`
            : `<button onclick="purchase('${item.file}')">BUY ⚡</button>`
        }
        `;

        container.appendChild(card);
    });
}

createCards();
</script>

</body>
</html>

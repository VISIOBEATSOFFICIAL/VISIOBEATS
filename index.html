<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VISIOBEATS ♬</title>

<!-- ✅ FAVICON -->
<link rel="icon" href="images.png">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: Poppins, sans-serif;
    overflow-x: hidden;
}

/* BACKGROUND */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee') center/cover no-repeat;
    z-index: -1;
    filter: brightness(0.3);
}

/* HEADER */
header {
    text-align: center;
    padding: 40px;
}

h1 {
    font-family: Orbitron;
    font-size: 3rem;
    text-shadow: 0 0 20px #ff004c;
}

/* SECTION */
.section {
    text-align: center;
    margin: 40px 0;
}

/* CAROUSEL */
.carousel {
    position: relative;
    height: 320px;
    perspective: 1000px;
}

.carousel-track {
    position: relative;
    height: 100%;
}

.card {
    position: absolute;
    width: 260px;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.7);
    padding: 15px;
    border-radius: 15px;
    transition: 0.5s;
    opacity: 0;
}

.card.active {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1.1);
    z-index: 3;
    box-shadow: 0 0 30px #ff004c;
}

.card.left {
    opacity: 0.6;
    transform: translate(-150%, -50%) scale(0.9) rotateY(20deg);
}

.card.right {
    opacity: 0.6;
    transform: translate(50%, -50%) scale(0.9) rotateY(-20deg);
}

.card.hidden {
    opacity: 0;
}

.cinematic .card.active {
    box-shadow: 0 0 30px #8a00ff;
}

audio {
    width: 100%;
    margin: 10px 0;
    filter: invert(1);
}

button {
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: linear-gradient(90deg, #ff004c, #8a00ff);
    color: white;
    cursor: pointer;
}

.nav button {
    width: auto;
    padding: 10px 20px;
    margin: 5px;
}
</style>
</head>

<body>

<header>
    <h1>VISIOBEATS ♬</h1>
    <div>Enter The Void</div>
</header>

<div class="section">
    <h2>NEW BEATS 🎵</h2>
    <div class="carousel">
        <div class="carousel-track" id="beats"></div>
    </div>
    <div class="nav">
        <button onclick="move('beats', -1)">◀</button>
        <button onclick="move('beats', 1)">▶</button>
    </div>
</div>

<div class="section cinematic">
    <h2>CINEMATIC 🎬</h2>
    <div class="carousel">
        <div class="carousel-track" id="cinematic"></div>
    </div>
    <div class="nav">
        <button onclick="move('cinematic', -1)">◀</button>
        <button onclick="move('cinematic', 1)">▶</button>
    </div>
</div>

<script>
const paypal = "https://paypal.me/zkaterswrldd/10";

// ✅ ONLY FILES THAT EXIST
const beats = [
    {title:"FALL APART", file:"beat1.mp3"},
    {title:"END OF THE WORLD", file:"beat2.mp3"},
    {title:"COMING SOON...", file:"beat1.mp3"},
    {title:"COMING SOON...", file:"beat2.mp3"}
];

const cinematic = [
    {title:"MENTAL DEFLATION", file:"horror1.mp3"},
    {title:"COMING SOON...", file:"horror1.mp3"},
    {title:"COMING SOON...", file:"horror1.mp3"}
];

const state = { beats: 0, cinematic: 0 };

// ✅ FIXED AUDIO SYSTEM
function stopAllAudio(current) {
    document.querySelectorAll("audio").forEach(a => {
        if (a !== current) {
            a.pause();
            a.currentTime = 0;
        }
    });
}

// CREATE CARDS
function createCards(list, id, price) {
    const container = document.getElementById(id);

    list.forEach(item => {
        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <h3>${item.title}</h3>
            <audio controls>
                <source src="${item.file}" type="audio/mpeg">
            </audio>
            <p>$${price}</p>
            <a href="${paypal}" target="_blank">
                <button>BUY ⚡</button>
            </a>
        `;

        const audio = card.querySelector("audio");
        audio.addEventListener("play", () => stopAllAudio(audio));

        container.appendChild(card);
    });

    update(id);
}

// UPDATE (WRAP FIX)
function update(id) {
    const cards = document.getElementById(id).children;
    const current = state[id];

    for (let i = 0; i < cards.length; i++) {
        cards[i].className = "card";

        if (i === current) {
            cards[i].classList.add("active");
        } else if (i === (current - 1 + cards.length) % cards.length) {
            cards[i].classList.add("left");
        } else if (i === (current + 1) % cards.length) {
            cards[i].classList.add("right");
        } else {
            cards[i].classList.add("hidden");
        }
    }
}

// MOVE
function move(id, dir) {
    const len = document.getElementById(id).children.length;
    state[id] = (state[id] + dir + len) % len;
    update(id);
}

// LOAD EVERYTHING ($10)
createCards(beats, "beats", 10);
createCards(cinematic, "cinematic", 10);
</script>

</body>
</html>

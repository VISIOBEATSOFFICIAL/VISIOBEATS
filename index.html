<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VISIOBEATS ♬</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: #0a0a12;
    color: white;
    font-family: Poppins, sans-serif;
}

/* HEADER */
header {
    text-align: center;
    padding: 40px 20px 10px;
}

h1 {
    font-family: Orbitron;
    font-size: 2.5rem;
    text-shadow: 0 0 20px #ff004c;
}

.subtitle {
    opacity: 0.6;
}

/* SECTION */
.section {
    max-width: 1100px;
    margin: 50px auto;
    padding: 0 20px;
}

.section h2 {
    margin-bottom: 20px;
}

/* SLIDER */
.slider {
    display: flex;
    gap: 20px;
    overflow-x: auto;
    padding-bottom: 10px;
}

.slider::-webkit-scrollbar {
    height: 6px;
}
.slider::-webkit-scrollbar-thumb {
    background: #ff004c;
}

/* CARD */
.card {
    min-width: 260px;
    background: #111122;
    border-radius: 15px;
    padding: 15px;
    transition: 0.3s;
    position: relative;
}

.card:hover {
    transform: translateY(-8px);
    box-shadow: 0 0 20px #ff004c;
}

/* NEW BADGE */
.new {
    position: absolute;
    top: 10px;
    left: 10px;
    background: #ff004c;
    padding: 4px 8px;
    font-size: 0.7rem;
    border-radius: 5px;
}

/* AUDIO */
audio {
    width: 100%;
    margin: 10px 0;
    filter: invert(1);
}

/* BUTTON */
button {
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: linear-gradient(90deg, #ff004c, #8a00ff);
    color: white;
    cursor: pointer;
}

button:hover {
    opacity: 0.85;
}
</style>
</head>

<body>

<header>
    <h1>VISIOBEATS ♬</h1>
    <div class="subtitle">Enter The Void</div>
</header>

<!-- BEATS -->
<div class="section">
    <h2>NEW BEATS 🎵</h2>
    <div class="slider" id="beats"></div>
</div>

<!-- CINEMATIC -->
<div class="section">
    <h2>CINEMATIC 🎬</h2>
    <div class="slider" id="cinematic"></div>
</div>

<script>
const paypal = "https://paypal.me/zkaterswrldd/10";

const beats = [
{title:"FALL APART", file:"beat1.mp3"},
{title:"END OF THE WORLD", file:"beat2.mp3"},
{title:"COMING SOON...", file:"beat3.mp3"},
{title:"COMING SOON...", file:"beat4.mp3"}
];

const cinematic = [
{title:"MENTAL DEFLATION", file:"horror1.mp3"},
{title:"COMING SOON...", file:"horror2.mp3"},
{title:"COMING SOON...", file:"horror3.mp3"}
];

function createCards(list, id) {
const container = document.getElementById(id);

list.forEach((item, index) => {
const card = document.createElement("div");
card.className = "card";

card.innerHTML = `
${id === "beats" && index < 2 ? '<div class="new">NEW</div>' : ''}
<h3>${item.title}</h3>
<audio controls>
<source src="${item.file}" type="audio/mpeg">
</audio>
<p>$10</p>
<button onclick="buy()">BUY ⚡</button>
`;

container.appendChild(card);
});
}

function buy() {
window.open(paypal, "_blank");
}

createCards(beats, "beats");
createCards(cinematic, "cinematic");
</script>

</body>
</html>

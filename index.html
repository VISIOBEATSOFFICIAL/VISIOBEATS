 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VISIOBEATS ♬</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: radial-gradient(circle at top, #1a0022, #000);
    color: white;
    font-family: Poppins, sans-serif;
    overflow-x: hidden;
}

/* BACKGROUND */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
}

header {
    text-align: center;
    padding: 50px 20px 20px;
}

h1 {
    font-family: Orbitron;
    font-size: clamp(2rem, 5vw, 3.5rem);
    text-shadow: 0 0 30px #ff2aa0;
}

.section {
    max-width: 1100px;
    margin: 50px auto;
    padding: 0 15px;
}

/* 3D CAROUSEL */
.carousel {
    display: flex;
    justify-content: center;
    align-items: center;
    perspective: 1000px;
    gap: 20px;
    overflow: hidden;
}

.card {
    width: 260px;
    background: rgba(15,15,30,0.8);
    border-radius: 15px;
    padding: 15px;
    backdrop-filter: blur(10px);
    transition: 0.5s;
    transform-style: preserve-3d;
    cursor: pointer;
    opacity: 0.6;
}

.card.active {
    transform: scale(1.2) translateZ(50px);
    opacity: 1;
    box-shadow: 0 0 30px #ff2aa0;
}

.card.left {
    transform: rotateY(25deg) scale(0.9);
}

.card.right {
    transform: rotateY(-25deg) scale(0.9);
}

audio {
    width: 100%;
    margin: 10px 0;
    filter: invert(1);
}

button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(90deg, #ff2aa0, #ff6ec7);
    color: white;
    font-weight: 600;
    cursor: pointer;
}

.download-btn {
    background: linear-gradient(90deg, #ff2aa0, #ffffff);
    color: black;
}

.confirm-btn {
    background: #00ffcc;
    color: black;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<header>
<h1>VISIOBEATS ♬</h1>
<p>Enter The Void</p>
</header>

<div class="section">
<h2>NEW BEATS 🎵</h2>
<div class="carousel" id="beats"></div>
</div>

<script>
// PARTICLES
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

let stars = Array.from({length:120}, () => ({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    r: Math.random()*1.5,
    d: Math.random()*0.3
}));

function animate() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="white";

    stars.forEach(s=>{
        s.y+=s.d;
        if(s.y>canvas.height)s.y=0;
        ctx.beginPath();
        ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
        ctx.fill();
    });

    requestAnimationFrame(animate);
}
animate();

// AUDIO SINGLE PLAY
let currentAudio=null;
document.addEventListener("play",e=>{
    if(currentAudio && currentAudio!==e.target) currentAudio.pause();
    currentAudio=e.target;
},true);

const paypal="https://paypal.me/zkaterswrldd/10";
let unlocked = JSON.parse(localStorage.getItem("purchased")) || [];

const beats=[
{title:"FALL APART",file:"beat1.mp3"},
{title:"END OF THE TIME",file:"beat2.mp3"},
{title:"LAST TIME",file:"beat3.mp3"},
{title:"Logistics",file:"beat4.mp3"},
{title:"TWO FACED",file:"beat5.mp3"},
];

function purchase(file){
    window.open(paypal,"_blank");

    alert("After completing payment, click CONFIRM PAYMENT to unlock.");
}

function confirmPurchase(file){
    if(!unlocked.includes(file)){
        unlocked.push(file);
        localStorage.setItem("purchased",JSON.stringify(unlocked));
        location.reload();
    }
}

// CREATE CAROUSEL
function createCarousel(list,id){
    const container=document.getElementById(id);
    let current=0;

    function render(){
        container.innerHTML="";

        list.forEach((item,i)=>{
            const isUnlocked=unlocked.includes(item.file);

            const card=document.createElement("div");
            card.className="card";

            if(i===current) card.classList.add("active");
            else if(i===current-1) card.classList.add("left");
            else if(i===current+1) card.classList.add("right");

            card.innerHTML=`
            <h3>${item.title}</h3>

            <audio controls controlsList="nodownload">
                <source src="${item.file}" type="audio/mpeg">
            </audio>

            <p>$10</p>

            ${
            isUnlocked
            ? `<a href="${item.file}" download>
                <button class="download-btn">DOWNLOAD ⚡</button>
               </a>`
            : `
                <button onclick="purchase('${item.file}')">PURCHASE ⚡</button>
                <button class="confirm-btn" onclick="confirmPurchase('${item.file}')">I PAID ✅</button>
              `
            }
            `;

            card.onclick=()=>{current=i;render();};
            container.appendChild(card);
        });
    }

    render();
}

createCarousel(beats,"beats");
</script>

</body>
</html>

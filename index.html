<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VISIOBEATS ♬</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: radial-gradient(circle at top, #1a0022, #000);
    color: white;
    font-family: Poppins, sans-serif;
    overflow-x: hidden;
}

canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
}

header {
    text-align: center;
    padding: 50px 20px 20px;
}

h1 {
    font-family: Orbitron;
    font-size: clamp(2rem, 5vw, 3.5rem);
    text-shadow: 0 0 30px #ff2aa0;
}

.subtitle {
    opacity: 0.7;
}

.section {
    max-width: 1100px;
    margin: 50px auto;
    padding: 0 15px;
}

.slider {
    display: flex;
    gap: 20px;
    overflow-x: auto;
}

.card {
    min-width: 240px;
    background: rgba(15,15,30,0.8);
    border-radius: 15px;
    padding: 15px;
    transition: 0.3s;
    backdrop-filter: blur(10px);
}

.card:hover {
    transform: translateY(-8px) scale(1.03);
    box-shadow: 0 0 25px #ff2aa0;
}

.new {
    background: #ff2aa0;
    padding: 4px 8px;
    font-size: 0.7rem;
    border-radius: 5px;
    display: inline-block;
}

audio {
    width: 100%;
    margin: 10px 0;
    filter: invert(1);
}

button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(90deg, #ff2aa0, #ff6ec7);
    color: white;
    font-weight: 600;
    cursor: pointer;
}

.download-btn {
    background: linear-gradient(90deg, #ff2aa0, #ffffff);
    color: black;
}

</style>
</head>

<body>

<canvas id="bg"></canvas>

<header>
<h1>VISIOBEATS ♬</h1>
<div class="subtitle">Enter The Void</div>
</header>

<div class="section">
<h2>NEW BEATS 🎵</h2>
<div class="slider" id="beats"></div>
</div>

<div class="section">
<h2>CINEMATIC 🎬</h2>
<div class="slider" id="cinematic"></div>
</div>

<script>
// PARTICLE SPACE BACKGROUND
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

let stars = [];
for (let i = 0; i < 120; i++) {
    stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.5,
        d: Math.random() * 0.3
    });
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "white";

    stars.forEach(s => {
        s.y += s.d;
        if (s.y > canvas.height) s.y = 0;

        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
    });

    requestAnimationFrame(animate);
}
animate();

// AUDIO CONTROL (ONLY ONE AT A TIME)
let currentAudio = null;
document.addEventListener("play", function(e) {
    if (currentAudio && currentAudio !== e.target) {
        currentAudio.pause();
    }
    currentAudio = e.target;
}, true);

const paypal = "https://paypal.me/zkaterswrldd/10";
let unlocked = JSON.parse(localStorage.getItem("purchased")) || [];

const beats = [
{title:"FALL APART", file:"beat1.mp3"},
{title:"END OF THE TIME", file:"beat2.mp3"},
{title:"LAST TIME", file:"beat3.mp3"},
{title:"Logistics", file:"beat4.mp3"},
{title:"TWO FACED", file:"beat5.mp3"},
];

const cinematic = [
{title:"MENTAL DEFLATION", file:"horror1.mp3"},
{title:"COMING SOON...", file:"horror2.mp3"},
{title:"COMING SOON...", file:"horror3.mp3"}
];

function purchase(file) {
    window.open(paypal, "_blank");

    setTimeout(() => {
        unlocked.push(file);
        localStorage.setItem("purchased", JSON.stringify(unlocked));
        location.reload();
    }, 2000);
}

function createCards(list, id) {
    const container = document.getElementById(id);

    list.forEach((item, index) => {
        const isUnlocked = unlocked.includes(item.file);

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
        ${id === "beats" && index < 2 ? '<div class="new">NEW</div>' : ''}
        <h3>${item.title}</h3>

        <!-- LISTEN PREVIEW ALWAYS AVAILABLE -->
        <audio controls controlsList="nodownload">
            <source src="${item.file}" type="audio/mpeg">
        </audio>

        <p>$10</p>

        ${isUnlocked
            ? `<a href="${item.file}" download>
                <button class="download-btn">DOWNLOAD MP3 ⚡</button>
               </a>`
            : `<button onclick="purchase('${item.file}')">PURCHASE THIS BEAT ⚡</button>`
        }
        `;

        container.appendChild(card);
    });
}

createCards(beats, "beats");
createCards(cinematic, "cinematic");
</script>

</body>
</html>
